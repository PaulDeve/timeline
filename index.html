<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Timeline Tracker - Your Journey in Days</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <!-- Fondo animado con partículas -->
    <div class="background">
        <div class="particles"></div>
        <div class="aurora"></div>
    </div>

    <!-- Loader inicial futurista -->
    <div class="loader-container">
        <div class="loader">
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-text">Life Timeline</div>
        </div>
    </div>

    <!-- Contenedor principal -->
    <div class="container">


        <!-- Sección principal dividida -->
        <main class="main-content">
            <!-- Sección izquierda: Card de frase + Botones -->
            <section class="left-section">
                <div class="quote-card glass-morphism">
                    <div class="quote-header">
                        <span class="quote-day-display" id="dayDisplay">Día 1</span>
                        <span class="quote-indicator">🌟</span>
                    </div>
                    
                    <div class="quote-content">
                        <p class="quote-text" id="quoteText">Cargando tu viaje...</p>
                    </div>
                    
                    
                </div>

                <!-- Botones de control -->
           


            </section>


        </main>

        <!-- Footer -->
       
    </div>

    <script src="script.js"></script>
</body>
</html>
